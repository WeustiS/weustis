<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock of the Month — weustis.com</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111;
      --surface:  #1a1a1a;
      --border:   #2c2c2c;
      --text:     #e0e0e0;
      --muted:    #666;
      --accent:   #7eb8d4;
      --radius:   8px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
    }
    header .container {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .site-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .site-subtitle {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Current ROTM ── */
    .rotm-hero {
      padding: 48px 0 0;
    }
    .rotm-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .rotm-name {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .rotm-date {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── Viewer ── */
    .viewer-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      min-height: 300px;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .viewer-wrap iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }
    .viewer-placeholder {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .viewer-placeholder svg {
      opacity: 0.3;
    }
    .viewer-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
    .btn.active { border-color: var(--accent); color: var(--accent); }

    /* ── Photo gallery ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 6px;
      margin-bottom: 64px;
    }
    .gallery-item {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: 4px;
      cursor: zoom-in;
      background: var(--surface);
    }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease, opacity 0.3s;
      opacity: 0;
    }
    .gallery-item img.loaded { opacity: 1; }
    .gallery-item:hover img { transform: scale(1.03); }
    .gallery-item .img-num {
      position: absolute;
      bottom: 6px; left: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 48px;
    }

    /* ── Archive ── */
    .archive-section { padding-bottom: 64px; }
    .archive-section h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .archive-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .archive-card:hover { border-color: #444; }
    a.archive-card { text-decoration: none; color: inherit; }
    .archive-thumb {
      aspect-ratio: 16/9;
      background: #0d0d0d;
      overflow: hidden;
      position: relative;
    }
    .archive-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .archive-thumb img.loaded { opacity: 1; }
    .archive-thumb .no-photo {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 28px;
    }
    .archive-info { padding: 14px 16px; }
    .archive-info .month { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .archive-info .name { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
    .archive-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .archive-links a {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    .archive-links a:hover { color: var(--accent); border-color: var(--accent); text-decoration: none; }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 95vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      display: block;
    }
    #lightbox-loading {
      position: absolute;
      color: var(--muted);
      font-size: 13px;
    }
    .lb-controls {
      position: absolute;
      bottom: 20px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .lb-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.2); }
    .lb-counter { font-size: 13px; color: var(--muted); }
    #lightbox-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }
    #lightbox-close:hover { color: #fff; }
    #lightbox-dl {
      position: absolute;
      top: 16px; right: 56px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    #lightbox-dl:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 0;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .viewer-wrap { aspect-ratio: unset; height: 60vw; min-height: 260px; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <span class="site-title">weustis.com</span>
    <span class="site-subtitle">rock of the month</span>
  </div>
</header>

<main>
  <div class="container">

    <!-- ── Current ROTM ── -->
    <section class="rotm-hero" id="current">
      <p class="rotm-eyebrow">Rock of the Month</p>
      <h1 class="rotm-name" id="current-name">Azurite &amp; Malachite</h1>
      <p class="rotm-date" id="current-date">April 2026</p>

      <!-- 3D Viewer -->
      <div class="viewer-wrap" id="viewer-wrap">
        <div class="viewer-placeholder" id="viewer-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span>3D viewer — configure R2 URL to enable</span>
        </div>
      </div>

      <div class="viewer-actions" id="viewer-actions">
        <button class="btn active" id="btn-selfhost" onclick="switchViewer('self')">Self-hosted</button>
        <button class="btn" id="btn-supersplat" onclick="switchViewer('supersplat')">SuperSplat</button>
        <a class="btn" id="splat-download" href="#" download>↓ Download .ply</a>
      </div>

      <!-- Photo gallery -->
      <p class="section-label">Focus Stacks</p>
      <div class="gallery-grid" id="gallery-grid"></div>
    </section>

    <hr class="divider" />

    <!-- ── Archive ── -->
    <section class="archive-section">
      <h2>Archive</h2>
      <div class="archive-grid" id="archive-grid"></div>
    </section>

  </div>
</main>

<footer>
  <div class="container">weustis.com</div>
</footer>

<!-- Lightbox -->
<div id="lightbox" role="dialog" aria-modal="true">
  <span id="lightbox-loading">Loading full resolution…</span>
  <img id="lightbox-img" src="" alt="" />
  <a id="lightbox-dl" href="#" download>↓ full res</a>
  <button id="lightbox-close" onclick="closeLightbox()" aria-label="Close">×</button>
  <div class="lb-controls">
    <button class="lb-btn" id="lb-prev" onclick="lbNav(-1)">← prev</button>
    <span class="lb-counter" id="lb-counter"></span>
    <button class="lb-btn" id="lb-next" onclick="lbNav(1)">next →</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONFIG — update these after setting up R2
// ─────────────────────────────────────────────
const R2_BASE = 'https://pub-9fe1a154acb94e2d8d40117232b563ec.r2.dev';

const CURRENT = {
  name:   'Azurite &amp; Malachite',
  date:   'April 2026',
  slug:   'azurite-malachite',
  plyUrl: `${R2_BASE}/rocks/azurite-malachite/splat.ply`,
  supersplatId: null, // set once uploaded to SuperSplat, e.g. 'abc123'
  photos: [], // auto-detected via HEAD requests on init
};

const ARCHIVE = [
  {
    name: 'Quartz, Pyrite &amp; Ammonite',
    date: 'March 2026',
    slug: 'quartz-pyrite-ammonite-mar26',
    supersplatId: null,
  },
  {
    name: 'Galena, Quartz &amp; Calcite',
    date: 'February 2026',
    slug: 'galena-quartz-calcite-feb26',
    supersplatId: '2797daae',
  },
  {
    name: 'Druzy Quartz &amp; Calcite Stalactites',
    date: 'January 2026',
    slug: 'druzy-quartz-stalactites-jan26',
    supersplatId: null,
  },
  {
    name: 'Grape Amethyst',
    date: 'December 2025',
    slug: 'grape-amethyst-dec25',
    supersplatId: null,
  },
  {
    name: 'Druzy Quartz &amp; Plasma Agate',
    date: 'November 2025',
    slug: 'druzy-quartz-plasma-agate-nov25',
    supersplatId: null,
  },
  {
    name: 'Epidote',
    date: 'October 2025',
    slug: 'epidote-oct25',
    supersplatId: null,
  },
  {
    name: 'Manufactured Silicon',
    date: 'September 2025',
    slug: 'manufactured-silicon-sep25',
    supersplatId: null,
  },
  {
    name: 'Vanadinite',
    date: 'August 2025',
    slug: 'vanadinite-aug25',
    supersplatId: 'a08eb0eb',
  },
];

// ─────────────────────────────────────────────
//  Viewer toggle
// ─────────────────────────────────────────────
let currentViewer = null;

function switchViewer(mode) {
  const wrap = document.getElementById('viewer-wrap');
  document.getElementById('btn-selfhost').classList.toggle('active', mode === 'self');
  document.getElementById('btn-supersplat').classList.toggle('active', mode === 'supersplat');
  currentViewer = mode;

  // Remove existing iframe/placeholder
  const existing = wrap.querySelector('iframe, .viewer-placeholder');
  if (existing) existing.remove();

  const iframe = document.createElement('iframe');
  iframe.setAttribute('allowfullscreen', '');

  if (mode === 'self') {
    if (!CURRENT.plyUrl || CURRENT.plyUrl.startsWith('YOUR_')) {
      showPlaceholder(wrap, '3D viewer — configure R2_BASE URL to enable');
      return;
    }
    iframe.src = `/viewer/?url=${encodeURIComponent(CURRENT.plyUrl)}`;
  } else {
    if (!CURRENT.supersplatId) {
      showPlaceholder(wrap, 'No SuperSplat ID configured for this rock');
      return;
    }
    iframe.src = `https://superspl.at/s?id=${CURRENT.supersplatId}`;
    iframe.setAttribute('allow', 'fullscreen; xr-spatial-tracking');
  }
  wrap.appendChild(iframe);
}

function showPlaceholder(wrap, msg) {
  const ph = document.createElement('div');
  ph.className = 'viewer-placeholder';
  ph.innerHTML = `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><span>${msg}</span>`;
  wrap.appendChild(ph);
}

// ─────────────────────────────────────────────
//  Gallery
// ─────────────────────────────────────────────
let galleryPhotos = [];
let lbIndex = 0;

function buildGallery() {
  const grid = document.getElementById('gallery-grid');
  const base = `${R2_BASE}/rocks/${CURRENT.slug}/photos`;
  galleryPhotos = CURRENT.photos.map(n => ({
    thumb: `${base}/${n}-thumb.jpg`,
    full:  `${base}/${n}-full.jpg`,
  }));

  grid.innerHTML = '';
  galleryPhotos.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.onclick = () => openLightbox(i);
    item.innerHTML = `<img data-src="${p.thumb}" alt="Photo ${i+1}" /><span class="img-num">${i+1}</span>`;
    grid.appendChild(item);
  });

  // Lazy load thumbnails
  const imgs = grid.querySelectorAll('img[data-src]');
  if ('IntersectionObserver' in window) {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const img = e.target;
          img.src = img.dataset.src;
          img.onload = () => img.classList.add('loaded');
          obs.unobserve(img);
        }
      });
    }, { rootMargin: '200px' });
    imgs.forEach(img => obs.observe(img));
  } else {
    imgs.forEach(img => { img.src = img.dataset.src; img.onload = () => img.classList.add('loaded'); });
  }
}

// ─────────────────────────────────────────────
//  Lightbox
// ─────────────────────────────────────────────
function openLightbox(index) {
  lbIndex = index;
  document.getElementById('lightbox').classList.add('open');
  loadLbPhoto(index);
  document.addEventListener('keydown', lbKeyHandler);
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
  document.removeEventListener('keydown', lbKeyHandler);
}

function loadLbPhoto(index) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  const dl  = document.getElementById('lightbox-dl');
  const loading = document.getElementById('lightbox-loading');

  img.style.opacity = '0';
  loading.style.display = 'block';

  const full = galleryPhotos[index].full;
  dl.href = full;

  const tmp = new Image();
  tmp.onload = () => {
    img.src = full;
    img.style.opacity = '1';
    loading.style.display = 'none';
  };
  tmp.onerror = () => {
    loading.textContent = 'Could not load full-res image';
  };
  tmp.src = full;

  document.getElementById('lb-counter').textContent =
    `${index + 1} / ${galleryPhotos.length}`;
}

function lbNav(dir) {
  lbIndex = (lbIndex + dir + galleryPhotos.length) % galleryPhotos.length;
  loadLbPhoto(lbIndex);
}

function lbKeyHandler(e) {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft')  lbNav(-1);
}

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

// ─────────────────────────────────────────────
//  Archive cards
// ─────────────────────────────────────────────
function buildArchive() {
  const grid = document.getElementById('archive-grid');
  ARCHIVE.forEach(rock => {
    const links = [];
    if (rock.supersplatId) links.push(`<a href="https://superspl.at/s?id=${rock.supersplatId}" target="_blank" rel="noopener">3D (SuperSplat)</a>`);
    if (rock.plyUrl && !rock.plyUrl.startsWith('YOUR_')) links.push(`<a href="${rock.plyUrl}" download>↓ .ply</a>`);

    const primaryLink = rock.supersplatId
      ? `https://superspl.at/s?id=${rock.supersplatId}`
      : (rock.plyUrl && !rock.plyUrl.startsWith('YOUR_') ? rock.plyUrl : null);

    const card = document.createElement(primaryLink ? 'a' : 'div');
    card.className = 'archive-card';
    if (primaryLink) { card.href = primaryLink; card.target = '_blank'; card.rel = 'noopener'; }
    card.innerHTML = `
      <div class="archive-thumb"><div class="no-photo">◈</div></div>
      <div class="archive-info">
        <p class="month">${rock.date}</p>
        <p class="name">${rock.name}</p>
        <div class="archive-links">${links.join('')}</div>
      </div>`;
    grid.appendChild(card);

    // Load cover photo from manifest asynchronously
    const thumbWrap = card.querySelector('.archive-thumb');
    fetch(`${R2_BASE}/rocks/${rock.slug}/photos/manifest.json`)
      .then(r => r.json())
      .then(data => {
        if (!data.photos || !data.photos.length) return;
        const url = `${R2_BASE}/rocks/${rock.slug}/photos/${data.photos[0]}-thumb.jpg`;
        const img = document.createElement('img');
        img.alt = rock.name;
        img.onload = () => { img.classList.add('loaded'); thumbWrap.innerHTML = ''; thumbWrap.appendChild(img); };
        img.src = url;
      })
      .catch(() => {}); // no manifest yet — keep placeholder
  });
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
async function detectPhotos(slug) {
  const r = await fetch(`${R2_BASE}/rocks/${slug}/photos/manifest.json`);
  const data = await r.json();
  return data.photos;
}

async function init() {
  if (CURRENT.plyUrl && !CURRENT.plyUrl.startsWith('YOUR_')) {
    document.getElementById('splat-download').href = CURRENT.plyUrl;
  }
  switchViewer('self');
  CURRENT.photos = await detectPhotos(CURRENT.slug);
  buildGallery();
  buildArchive();
}

init();
</script>

</body>
</html>
