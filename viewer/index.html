<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: system-ui, sans-serif; }

    canvas { display: block; }

    #spinner {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px;
      perspective: 200px;
      pointer-events: none;
    }
    #spinner > div {
      width: 100%; height: 100%;
      border: 3px solid #fff;
      transform-style: preserve-3d;
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin {
      from { transform: rotateX(0deg) rotateY(0deg); }
      to   { transform: rotateX(360deg) rotateY(180deg); }
    }

    #progress {
      position: absolute;
      top: 0; left: 0;
      height: 3px;
      background: #7eb8d4;
      width: 0%;
      z-index: 10;
    }

    #message {
      position: absolute;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      color: #888;
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
    }

    #fps {
      position: absolute;
      top: 8px; right: 8px;
      font-size: 11px;
      color: #555;
      pointer-events: none;
    }

    #camid {
      position: absolute;
      bottom: 8px; right: 8px;
      font-size: 11px;
      color: #555;
      pointer-events: none;
    }


    #controls-hint {
      position: absolute;
      bottom: 8px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #444;
      pointer-events: none;
      white-space: nowrap;
    }

  </style>
</head>
<body>
  <div id="progress"></div>
  <div id="spinner"><div></div></div>
  <canvas id="canvas"></canvas>
  <div id="fps"></div>
  <div id="camid"></div>
  <div id="message"></div>
<div id="controls-hint">drag to orbit · scroll to zoom · right-drag to pan</div>
  <script src="main.js"></script>
</body>
</html>
